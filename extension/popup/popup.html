<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>BingeBreak</h1>
    <button id="open-options" class="icon-btn" title="Settings">⚙</button>
  </header>

  <form id="controls">
    <label class="full">
      Show
      <input type="text" id="show" placeholder="e.g. Severance" required />
    </label>
    <label>
      Season
      <input type="number" id="season" min="1" value="1" required />
    </label>
    <label>
      Episode
      <input type="number" id="episode" min="1" value="1" required />
    </label>
    <label>
      Minutes
      <input type="number" id="minutes" min="10" step="5" value="120" />
    </label>
    <div class="buttons full">
      <button type="submit" id="stop-btn" class="primary">Find tonight's stop point</button>
    </div>
    <div class="buttons full secondary-row">
      <button type="button" id="plan-btn">Night plan</button>
      <button type="button" id="analyze-btn">Season overview</button>
    </div>
    <input type="file" id="sub-file" accept=".srt,.vtt" hidden />
  </form>

  <div id="progress" hidden>
    <div id="progress-label"></div>
    <div class="bar-track"><div id="bar-fill"></div></div>
  </div>
  <div id="status" hidden></div>
  <div id="captions-prompt" hidden>
    <p>
      Couldn't get this episode's captions automatically (no readable player
      track, no community subtitles found). You can still analyze it from a
      subtitle file.
    </p>
    <button type="button" id="pick-file">Choose subtitle file (.srt / .vtt)</button>
  </div>
  <div id="results"></div>
  <footer id="source" hidden></footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
